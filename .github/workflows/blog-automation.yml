name: Blog Automation
on:
  repository_dispatch:
    types: [blog-run]
  workflow_dispatch:
    inputs:
      action: { description: 'draft | revise | publish', required: true, default: 'draft' }
      monday_item: { required: false }
      topic: { required: false }
      primary_keyword: { required: false }
      supporting: { required: false }
      edit_notes: { required: false }
      category: { required: false }
      date: { required: false }
      name_prefix: { required: false }
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run blog robot
        env:
          BLOG_ACTION: ${{ github.event.inputs.action || github.event.client_payload.action }}
          BLOG_MONDAY_ITEM: ${{ github.event.inputs.monday_item || github.event.client_payload.monday_item }}
          BLOG_TOPIC: ${{ github.event.inputs.topic || github.event.client_payload.topic }}
          BLOG_PRIMARY_KEYWORD: ${{ github.event.inputs.primary_keyword || github.event.client_payload.primary_keyword }}
          BLOG_SUPPORTING: ${{ github.event.inputs.supporting || github.event.client_payload.supporting }}
          BLOG_EDIT_NOTES: ${{ github.event.inputs.edit_notes || github.event.client_payload.edit_notes }}
          BLOG_CATEGORY: ${{ github.event.inputs.category || github.event.client_payload.category }}
          BLOG_DATE: ${{ github.event.inputs.date || github.event.client_payload.date }}
          BLOG_NAME_PREFIX: ${{ github.event.inputs.name_prefix || github.event.client_payload.name_prefix }}
          AI_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
          MONDAY_BOARD: '18420374601'
          MONDAY_STATUS_COL: 'color_mm4wvg8w'
          MONDAY_LINK_COL: 'link_mm4whgv0'
        run: node .github/scripts/blog-robot.mjs
